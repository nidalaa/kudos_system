default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: kudos_plane_development
  url: <%= ENV["DATABASE_URL"] %>

test:
  <<: *default
  database: kudos_plane_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
